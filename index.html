<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dustoff Reset</title>
    <style>
      /* Critical: transparent background for Tauri window on macOS */
      * {
        box-sizing: border-box;
      }
      html {
        background: transparent !important;
        background-color: transparent !important;
      }
      body {
        background: transparent !important;
        background-color: transparent !important;
        margin: 0;
        padding: 0;
        min-height: 100vh;
        overflow: hidden;
      }
      #root {
        background: transparent !important;
        background-color: transparent !important;
        min-height: 100vh;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
